<!doctype html>
<html lang="hu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedSys Dashboard</title>
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body>
    <header>
        <h1>MedSys</h1>
        <p>Orvosi és pszichológiai alkalmassági nyilvántartás</p>
    </header>

    <main>
        <section class="dashboard">
            <div class="card">
                <h2>Összes személy</h2>
                <span>0</span>
            </div>

            <div class="card">
                <h2>Érvényes orvosi</h2>
                <span>0</span>
            </div>

            <div class="card">
                <h2>Lejárt orvosi</h2>
                <span>0</span>
            </div>

            <div class="card">
                <h2>Lejárt pszichológiai</h2>
                <span>0</span>
            </div>
        </section>

        <section class="toolbar">
            <input type="text" placeholder="Keresés név vagy TAJ alapján..." />

            <button>Új személy</button>
        </section>

        <section>
            <table>
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Születési idő</th>
                        <th>TAJ</th>
                        <th>Orvosi</th>
                        <th>Orvosi kezdete</th>
                        <th>Pszichológiai</th>
                        <th>Pszichológiai kezdete</th>
                        <th>Megjegyzés</th>
                        <th>Állapot</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </section>
    </main>

    <script src="static/js/api.js"></script>
    <script src="static/js/table.js"></script>
</body>

</html>
